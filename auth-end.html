<!doctype html>
<html><head><meta charset="utf-8"><title>Auth End</title></head>
<body>
<script src="https://res.cdn.office.net/teams-js/2.32.0/js/MicrosoftTeams.min.js"></script>
<script>
  microsoftTeams.app.initialize().then(() => {
    const hash = location.hash.substring(1);
    const params = new URLSearchParams(hash || location.search);
    if (params.get('error')) microsoftTeams.authentication.notifyFailure(params.get('error'));
    else microsoftTeams.authentication.notifySuccess(hash || location.search);
  });
</script>
</body></html>
